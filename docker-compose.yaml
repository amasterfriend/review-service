services:

  mysql:
    image: mysql:8.0
    container_name: review-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: review_db
    ports:
      - "3306:3306"
    volumes:
      - ~/review-mysql-data:/var/lib/mysql
      - ~/learn_go/review-repo/review-service/my.cnf:/etc/mysql/conf.d/my.cnf

  redis:
    image: redis:7
    container_name: review-redis
    ports:
      - "6379:6379"
    volumes:
      - ~/review-redis-data:/data
    command: redis-server --appendonly yes

  review-consul:
    image: consul:1.15.3
    container_name: review-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: consul agent -dev -client=0.0.0.0

  canal:
    image: canal/canal-server:v1.1.7
    container_name: canal-server
    depends_on:
      - mysql
    ports:
      - "11111:11111"
    environment:
      - canal.destinations=example
      - canal.instance.master.address=mysql:3306 
      - canal.instance.tsdb.enable=true 
      - canal.instance.dbUsername=canal
      - canal.instance.dbPassword=canal
      - canal.serverMode=kafka
      - kafka.bootstrap.servers=review-kafka1:19092

  review-zoo1:
    image: confluentinc/cp-zookeeper:7.3.2
    hostname: review-zoo1
    container_name: review-zoo1
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_SERVERS: review-zoo1:2888:3888

  review-kafka1:
    image: confluentinc/cp-kafka:7.3.2
    hostname: review-kafka1
    container_name: review-kafka1
    ports:
      - "9092:9092"
      - "29092:29092"
      - "19999:9999"
    environment:
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://review-kafka1:19092,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092,DOCKER://host.docker.internal:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: "review-zoo1:2181"
      KAFKA_BROKER_ID: 1
      KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async.DefaultEventHandler=INFO,state.change.logger=INFO"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: ${DOCKER_HOST_IP:-127.0.0.1}
      KAFKA_AUTHORIZER_CLASS_NAME: kafka.security.authorizer.AclAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
    depends_on:
      - review-zoo1
  review-kafka-ui:
    container_name: review-kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - 8070:8080
    depends_on:
      - review-kafka1
    environment:
      DYNAMIC_CONFIG_ENABLED: "TRUE"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: review-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ./data/es:/usr/share/elasticsearch/data
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: review-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch