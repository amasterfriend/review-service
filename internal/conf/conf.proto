syntax = "proto3";
package kratos.api;

option go_package = "review-service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Snowflake snowflake = 3;
  ElasticSearch elasticsearch = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message RateLimit {
    message ListReviewByStore {
      int32 qps = 1;
      int32 burst = 2;
    }
    ListReviewByStore list_review_by_store = 1;
  }
  HTTP http = 1;
  GRPC grpc = 2;
  RateLimit rate_limit = 3;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  message Cache {
    google.protobuf.Duration hot_ttl = 1;
    google.protobuf.Duration stale_ttl = 2;
  }
  message Degrade {
    bool enable_stale_fallback = 1;
  }
  Database database = 1;
  Redis redis = 2;
  Cache cache = 3;
  Degrade degrade = 4;
}

message Snowflake {
  string start_time = 1;
  int64 machine_id = 2;
}

message Registry {
  message Consul {
    string address = 1;
    string scheme = 2;
  }
  Consul consul = 1;
}

message ElasticSearch {
  repeated string addresses = 1;  
}
